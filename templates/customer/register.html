{% extends "customer/base.html" %}

{% block title %}Cadastro do cliente{% endblock %}

{% block customer_content %}
<section class="compare-card form-card">
    <p class="eyebrow">Cliente</p>
    <h1>Criar conta</h1>
    <form method="post" class="panel-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <label>
                <span>{{ field.label }}</span>
                {{ field }}
                {{ field.errors }}
            </label>
        {% endfor %}
        <button type="submit">Cadastrar</button>
    </form>
    <p class="muted">Ja tem conta? <a class="table-action" href="{% url 'customer-login' %}">Entrar</a></p>
</section>
{% endblock %}
