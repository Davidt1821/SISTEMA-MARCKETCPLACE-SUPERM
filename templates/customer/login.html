{% extends "customer/base.html" %}

{% block title %}Login do cliente{% endblock %}

{% block customer_content %}
<section class="compare-card form-card">
    <p class="eyebrow">Cliente</p>
    <h1>Entrar</h1>
    <form method="post" class="panel-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <label>
                <span>{{ field.label }}</span>
                {{ field }}
                {{ field.errors }}
            </label>
        {% endfor %}
        <button type="submit">Entrar</button>
    </form>
    <p class="muted">Ainda nao tem conta? <a class="table-action" href="{% url 'customer-register' %}">Criar cadastro</a></p>
</section>
{% endblock %}
