{% extends "market_panel/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="compare-card form-card">
    <p class="eyebrow">Promocoes</p>
    <h1>{{ title }}</h1>

    <form method="post" class="panel-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <label>
                <span>{{ field.label }}</span>
                {{ field }}
                {{ field.errors }}
            </label>
        {% endfor %}
        <div class="form-actions">
            <button type="submit">Salvar promocao</button>
            <a class="table-action" href="{% url 'market-promotions' %}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
