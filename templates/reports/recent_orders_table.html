{% if orders %}
    <div class="price-table-wrapper">
        <table class="price-table">
            <thead>
                <tr>
                    <th>Codigo</th>
                    <th>Cliente</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                    <tr>
                        <td>{{ order.code }}</td>
                        <td>{{ order.customer_name }}</td>
                        <td>{{ order.get_status_display }}</td>
                        <td>R$ {{ order.final_total|default:order.total_amount }}</td>
                        <td>{{ order.created_at }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% else %}
    <p class="empty-state">Nenhum pedido no periodo.</p>
{% endif %}
