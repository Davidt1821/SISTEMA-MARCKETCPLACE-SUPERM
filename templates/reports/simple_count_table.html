{% if rows %}
    <div class="price-table-wrapper">
        <table class="price-table">
            <thead><tr><th>Tipo</th><th>Total</th></tr></thead>
            <tbody>
                {% for row in rows %}
                    <tr>
                        <td>{{ row.label }}</td>
                        <td>{{ row.total }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% else %}
    <p class="empty-state">Nenhum dado no periodo.</p>
{% endif %}
